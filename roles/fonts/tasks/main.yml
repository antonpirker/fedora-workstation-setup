- name: Create user fonts directory
  file:
    path: "{{ user_home }}/.local/share/fonts"
    state: directory
    mode: "0755"
  become: false

- name: Copy fonts
  copy:
    src: "{{ playbook_dir }}/assets/fonts/"
    dest: "{{ user_home }}/.local/share/fonts/"
    mode: "0644"
  become: false

- name: Refresh font cache
  command: fc-cache -f
  become: false
  changed_when: false
