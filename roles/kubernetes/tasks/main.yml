- name: Import Kubernetes GPG key
  rpm_key:
    key: https://pkgs.k8s.io/core:/stable:/v1.32/rpm/repodata/repomd.xml.key
    state: present
    validate_certs: false

- name: Add Kubernetes repository
  yum_repository:
    name: kubernetes
    description: Kubernetes
    baseurl: https://pkgs.k8s.io/core:/stable:/v1.32/rpm/
    gpgcheck: true
    gpgkey: https://pkgs.k8s.io/core:/stable:/v1.32/rpm/repodata/repomd.xml.key
    enabled: true
    sslverify: false

- name: Install kubectl
  dnf:
    name: kubectl
    state: present

- name: Install Lens
  flatpak:
    name: dev.k8slens.OpenLens
    remote: flathub
    state: present
  become: false
